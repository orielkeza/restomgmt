spring.application.name=site

# Database configuration for production
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

#this property is used to specify how we will handle data
spring.jpa.hibernate.ddl-auto=validate

#logging only shows errors
spring.jpa.show-sql=false
logging.level.root=WARN
logging.level.com.restomgmt=INFO

#security configurations for user authentication, logging in, and role hierarchy
security.jwt.secret=${JWT_SECRET}

#react access to spring boot
app.cors.allowed-origins=${CORS_ALLOWED_ORIGIN:http://localhost:5173}

#sessions - Redis for distributed sessions
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
