spring.application.name=site

# These properties specify the data used for authentication and authroization for the database
# no spaces anywhere(inside brackets or outside)
#spring.datasource.username=${DB_USERNAME}
#spring.datasource.password=${DB_PASSWORD}

#hardcoding the password fixed some things, therefore, the var env was set up wrongly

#this property is used to specify how we will handle data
spring.jpa.hibernate.ddl-auto=update

#driver class for PostgreSql
spring.datasource.driver-class-name=org.postgresql.Driver

#used to show sql whenerver any query is executed by hibernate
#spring.jpa.show-sql: true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

#security configurations for user authentication, logging in, and role hierarchy
security.public-urls=/api/v1/auth/login,/api/v1/auth/register
security.role-hierarchy=ROLE_ADMIN > ROLE_STAFF \n ROLE_STAFF > ROLE_USER
security.jwt.secret=${JWT_SECRET:replace-this-in-production-min-32-chars}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

#react access to spring boot
app.cors.allowed-origins=${CORS_ALLOWED_ORIGIN}

