# Docker Profile Configuration
# This profile is used when running in Docker/Docker Compose environment

# Database configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Schema management
spring.jpa.hibernate.ddl-auto=update

# Logging
spring.jpa.show-sql=false
logging.level.root=INFO
logging.level.com.restomgmt=INFO

# Security
security.jwt.secret=${JWT_SECRET}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
security.public-urls=/auth/login,/auth/register,/menu/items,/menu/categories,/menu/items/**,/menu/categories/**,/auth/verify-email,/auth/forgot-password,/auth/reset-password,/auth/resend-verification

security.role-hierarchy=ROLE_ADMIN > ROLE_STAFF \n ROLE_STAFF > ROLE_USER

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGIN:http://localhost:5173}

# MongoDB
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI}

# RabbitMQ
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:admin}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:admin123}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
